<!DOCTYPE html>
<html>
<head>
  <title>Regina/Polyphon Disc Converter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Regina/Polyphon Disc Converter</h1>
  <h2>NOTE: ONLY 15.5" discs</h2>
  <p>Convert images of Regina/Polyphon 15.5" Discs into downloadable/playable MIDI files</p>
  <p>Make sure the image is clear and straight-on. Dark backgrounds, black especially, are HIGHLY recommended.</p>
  <input type="file" id="imageUpload">

  <br><br>

  <div id="workspace">
    <img id="discImage" width="800">
    <div id="edgeGuide">
      <div id="edgeLine"></div>
    </div>
    <div id="startGuide">
      <div id="startLine"></div>
      <div id=rotationHandle></div>
    </div>
    <div id="centerDot"></div>
  </div>
  <script src="script.js"></script>
  
</body>
</html>
